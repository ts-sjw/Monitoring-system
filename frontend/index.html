<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>最狠股票监控系统</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>最狠股票监控系统</h1>
        <p>只做分析建议，不自动交易</p>
      </div>
      <div class="notice">本系统仅用于学习和辅助分析，不构成投资建议，不自动交易。</div>
    </header>

    <main class="shell">
      <section class="market-panel">
        <div class="gauge" id="marketGauge"></div>
        <div class="index-strip" id="indexStrip"></div>
      </section>

      <aside class="watch-panel">
        <form id="watchForm" class="watch-form">
          <input id="codeInput" placeholder="代码 600519" maxlength="12" />
          <input id="nameInput" placeholder="名称可选" />
          <div class="grid3">
            <input id="costInput" type="number" step="0.01" placeholder="成本" />
            <input id="holdInput" type="number" step="1" placeholder="持仓%" />
            <input id="targetInput" type="number" step="1" placeholder="目标%" />
          </div>
          <button type="submit">添加 / 保存</button>
        </form>
        <div class="watch-list" id="watchList"></div>
      </aside>

      <section class="chart-panel">
        <div class="toolbar">
          <div>
            <strong id="stockTitle">选择股票</strong>
            <span id="dataSource"></span>
          </div>
          <div class="toolbar-actions">
            <button type="button" class="mode-btn active" data-chart-mode="daily">日K</button>
            <button type="button" class="mode-btn" data-chart-mode="minute">分时</button>
            <button id="refreshBtn" type="button">刷新</button>
          </div>
        </div>
        <div id="kChart" class="chart main-chart"></div>
        <div class="mini-grid">
          <div id="macdChart" class="chart"></div>
          <div id="rsiChart" class="chart"></div>
          <div id="kdjChart" class="chart"></div>
        </div>
      </section>

      <aside class="advice-panel">
        <div id="adviceCard" class="advice-card"></div>
        <div class="score-grid" id="scoreGrid"></div>
      </aside>

      <section class="bottom-panel">
        <div class="bottom-block">
          <h2>板块轮动热力图</h2>
          <div id="sectorHeat" class="chart"></div>
        </div>
        <div class="bottom-block">
          <h2>资金流</h2>
          <div id="fundFlow"></div>
        </div>
        <div class="bottom-block">
          <h2>消息流</h2>
          <div id="newsFlow"></div>
        </div>
        <div class="bottom-block">
          <h2>游资情绪</h2>
          <div id="hotMoneyFlow"></div>
        </div>
      </section>
    </main>

    <script src="app.js?v=9"></script>
  </body>
</html>
